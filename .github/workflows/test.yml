name: Test App

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20        # ← 18 se 20 kiya

      - name: Install dependencies
        run: npm install

      - name: Start app
        run: node index.js &

      - name: Wait for app
        run: |
          for i in {1..15}; do
            curl -s http://localhost:3000 && echo "App is up!" && exit 0
            echo "Waiting... attempt $i"
            sleep 2
          done
          echo "App failed to start!"
          exit 1

      - name: Test API
        run: curl --fail http://localhost:3000